# TODO: Use Secrets to store the passwords to all containers.
# TODO: Implement SSL encryption for the connection. Help here: https://stackoverflow.com/questions/60253058/how-to-set-up-a-docker-redis-container-with-ssl.
# TODO: Enable memory overcommit.
#
# Two operation modes:
# 1. Standalone (default): single redis container, host port exposed.
#    Start with: docker compose up -d
# 2. Cluster: 6-node Redis Cluster (3 masters + 3 replicas), internal
#    network only. Set REDIS_CLUSTER=true in your application and point
#    REDIS_HOST to `redis-cluster-node-1`.
#    Start with: docker compose --profile cluster up -d
#    The standalone node also starts but can be ignored when using
#    cluster mode.
networks:
  internal:
    name: "internal"
    # External means the container will be accessible from other containers in the same local network.
    # If you want to isolate the container create a new network, with different name for each container and without being external.
    external: true

volumes:
  redis:
    name: "redis"
  redis-cluster-node-1:
    name: "redis-cluster-node-1"
  redis-cluster-node-2:
    name: "redis-cluster-node-2"
  redis-cluster-node-3:
    name: "redis-cluster-node-3"
  redis-cluster-node-4:
    name: "redis-cluster-node-4"
  redis-cluster-node-5:
    name: "redis-cluster-node-5"
  redis-cluster-node-6:
    name: "redis-cluster-node-6"

services:
  # Standalone Redis (default, no profile needed).
  redis:
    image: "redis:7.4-alpine"
    container_name: "redis"
    # Explaination of the command:
    # --appendonly yes: This enables AOF persistence, which logs every write operation. It offers a better durability guarantee compared to RDB alone, as you can survive crashes with minimal data loss.
    # --auto-aof-rewrite-min-size: The minimum size of the AOF file before Redis will consider rewriting it. This is useful to prevent Redis from rewriting the AOF file too often.
    # --auto-aof-rewrite-percentage: Redis will check the size of the AOF file every minute. If the AOF file grew by more than the percentage since the last rewrite and the AOF file is at least equal to --auto-aof-rewrite-min-size, it will rewrite the AOF.
    # --maxmemory: The maximum amount of memory Redis can use. If the limit is reached, Redis will start to evict keys according to the policy set by maxmemory-policy.
    # --maxmemory-policy allkeys-lru: This is the default policy. It will evict the least recently used keys first, regardless of their type.
    # --maxclients: Limits the number of simultaneous connections to Redis.
    command: "redis-server --appendonly yes --auto-aof-rewrite-percentage ${REDIS_AOF_REWRITE_PERCENTAGE?Variable not set} --auto-aof-rewrite-min-size ${REDIS_AOF_REWRITE_MINIMUM_SIZE?Variable not set} --maxmemory ${REDIS_MAXIMUM_MEMORY?Variable not set} --maxmemory-policy allkeys-lru --maxclients ${REDIS_MAXIMUM_CLIENTS?Variable not set} --requirepass ${REDIS_PASSWORD?Variable not set} --port ${REDIS_PORT?Variable not set}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: "5s"
      timeout: "3s"
      retries: 5
    restart: "unless-stopped"
    networks:
      - "internal"
    ports:
      - "${REDIS_PORT?Variable not set}:${REDIS_PORT?Variable not set}"
    volumes:
      - "redis:/data"
    labels:
      - "traefik.enable=false"

  # Cluster nodes (behind `cluster` profile, start with --profile cluster).
  # Node 1 acts as the entry point. Set REDIS_HOST=redis-cluster-node-1
  # and REDIS_PORT to the ${REDIS_PORT} value in your application.
  # Internal-only: no host port mapping needed since the app container
  # connects via the Docker internal network.
  redis-cluster-node-1:
    image: "redis:7.4-alpine"
    container_name: "redis-cluster-node-1"
    profiles: ["cluster"]
    command: >
      redis-server
      --port ${REDIS_PORT?Variable not set}
      --cluster-enabled yes
      --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-ip redis-cluster-node-1
      --appendonly yes
      --requirepass ${REDIS_PASSWORD?Variable not set}
      --masterauth ${REDIS_PASSWORD?Variable not set}
      --maxmemory ${REDIS_MAXIMUM_MEMORY?Variable not set}
      --maxmemory-policy allkeys-lru
      --maxclients ${REDIS_MAXIMUM_CLIENTS?Variable not set}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD?Variable not set}", "ping"]
      interval: "5s"
      timeout: "3s"
      retries: 5
    restart: "unless-stopped"
    networks:
      - "internal"
    volumes:
      - "redis-cluster-node-1:/data"
    labels:
      - "traefik.enable=false"

  redis-cluster-node-2:
    image: "redis:7.4-alpine"
    container_name: "redis-cluster-node-2"
    profiles: ["cluster"]
    command: >
      redis-server
      --port ${REDIS_PORT?Variable not set}
      --cluster-enabled yes
      --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-ip redis-cluster-node-2
      --appendonly yes
      --requirepass ${REDIS_PASSWORD?Variable not set}
      --masterauth ${REDIS_PASSWORD?Variable not set}
      --maxmemory ${REDIS_MAXIMUM_MEMORY?Variable not set}
      --maxmemory-policy allkeys-lru
      --maxclients ${REDIS_MAXIMUM_CLIENTS?Variable not set}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD?Variable not set}", "ping"]
      interval: "5s"
      timeout: "3s"
      retries: 5
    restart: "unless-stopped"
    networks:
      - "internal"
    volumes:
      - "redis-cluster-node-2:/data"
    labels:
      - "traefik.enable=false"

  redis-cluster-node-3:
    image: "redis:7.4-alpine"
    container_name: "redis-cluster-node-3"
    profiles: ["cluster"]
    command: >
      redis-server
      --port ${REDIS_PORT?Variable not set}
      --cluster-enabled yes
      --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-ip redis-cluster-node-3
      --appendonly yes
      --requirepass ${REDIS_PASSWORD?Variable not set}
      --masterauth ${REDIS_PASSWORD?Variable not set}
      --maxmemory ${REDIS_MAXIMUM_MEMORY?Variable not set}
      --maxmemory-policy allkeys-lru
      --maxclients ${REDIS_MAXIMUM_CLIENTS?Variable not set}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD?Variable not set}", "ping"]
      interval: "5s"
      timeout: "3s"
      retries: 5
    restart: "unless-stopped"
    networks:
      - "internal"
    volumes:
      - "redis-cluster-node-3:/data"
    labels:
      - "traefik.enable=false"

  redis-cluster-node-4:
    image: "redis:7.4-alpine"
    container_name: "redis-cluster-node-4"
    profiles: ["cluster"]
    command: >
      redis-server
      --port ${REDIS_PORT?Variable not set}
      --cluster-enabled yes
      --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-ip redis-cluster-node-4
      --appendonly yes
      --requirepass ${REDIS_PASSWORD?Variable not set}
      --masterauth ${REDIS_PASSWORD?Variable not set}
      --maxmemory ${REDIS_MAXIMUM_MEMORY?Variable not set}
      --maxmemory-policy allkeys-lru
      --maxclients ${REDIS_MAXIMUM_CLIENTS?Variable not set}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD?Variable not set}", "ping"]
      interval: "5s"
      timeout: "3s"
      retries: 5
    restart: "unless-stopped"
    networks:
      - "internal"
    volumes:
      - "redis-cluster-node-4:/data"
    labels:
      - "traefik.enable=false"

  redis-cluster-node-5:
    image: "redis:7.4-alpine"
    container_name: "redis-cluster-node-5"
    profiles: ["cluster"]
    command: >
      redis-server
      --port ${REDIS_PORT?Variable not set}
      --cluster-enabled yes
      --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-ip redis-cluster-node-5
      --appendonly yes
      --requirepass ${REDIS_PASSWORD?Variable not set}
      --masterauth ${REDIS_PASSWORD?Variable not set}
      --maxmemory ${REDIS_MAXIMUM_MEMORY?Variable not set}
      --maxmemory-policy allkeys-lru
      --maxclients ${REDIS_MAXIMUM_CLIENTS?Variable not set}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD?Variable not set}", "ping"]
      interval: "5s"
      timeout: "3s"
      retries: 5
    restart: "unless-stopped"
    networks:
      - "internal"
    volumes:
      - "redis-cluster-node-5:/data"
    labels:
      - "traefik.enable=false"

  redis-cluster-node-6:
    image: "redis:7.4-alpine"
    container_name: "redis-cluster-node-6"
    profiles: ["cluster"]
    command: >
      redis-server
      --port ${REDIS_PORT?Variable not set}
      --cluster-enabled yes
      --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-ip redis-cluster-node-6
      --appendonly yes
      --requirepass ${REDIS_PASSWORD?Variable not set}
      --masterauth ${REDIS_PASSWORD?Variable not set}
      --maxmemory ${REDIS_MAXIMUM_MEMORY?Variable not set}
      --maxmemory-policy allkeys-lru
      --maxclients ${REDIS_MAXIMUM_CLIENTS?Variable not set}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD?Variable not set}", "ping"]
      interval: "5s"
      timeout: "3s"
      retries: 5
    restart: "unless-stopped"
    networks:
      - "internal"
    volumes:
      - "redis-cluster-node-6:/data"
    labels:
      - "traefik.enable=false"

  # One-shot container that forms the cluster after all nodes are healthy.
  # Exits after the cluster is created. Re-running it is safe (idempotent).
  redis-cluster-init:
    image: "redis:7.4-alpine"
    container_name: "redis-cluster-init"
    profiles: ["cluster"]
    depends_on:
      redis-cluster-node-1:
        condition: service_healthy
      redis-cluster-node-2:
        condition: service_healthy
      redis-cluster-node-3:
        condition: service_healthy
      redis-cluster-node-4:
        condition: service_healthy
      redis-cluster-node-5:
        condition: service_healthy
      redis-cluster-node-6:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Creating Redis Cluster (3 masters + 3 replicas)...' &&
        redis-cli -a ${REDIS_PASSWORD?Variable not set}
          --cluster create
          redis-cluster-node-1:${REDIS_PORT?Variable not set}
          redis-cluster-node-2:${REDIS_PORT?Variable not set}
          redis-cluster-node-3:${REDIS_PORT?Variable not set}
          redis-cluster-node-4:${REDIS_PORT?Variable not set}
          redis-cluster-node-5:${REDIS_PORT?Variable not set}
          redis-cluster-node-6:${REDIS_PORT?Variable not set}
          --cluster-replicas 1
          --cluster-yes
        &&
        echo 'Cluster created successfully.'
      "
    restart: "no"
    networks:
      - "internal"
    labels:
      - "traefik.enable=false"
